<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS - AI Trading System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            color: #888;
            font-size: 14px;
        }
        .portfolio-summary {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            background: #12121a;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #1e1e3f 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            min-width: 180px;
        }
        .stat-card .label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 8px;
        }
        .stat-card .value.positive { color: #00ff88; }
        .stat-card .value.negative { color: #ff4757; }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            padding: 20px 40px;
            min-height: calc(100vh - 200px);
        }
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: linear-gradient(135deg, #1a1a2e 0%, #1e1e3f 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
        }
        .card h2 {
            font-size: 16px;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .positions-table {
            width: 100%;
            border-collapse: collapse;
        }
        .positions-table th {
            text-align: left;
            padding: 12px;
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a4a;
        }
        .positions-table td {
            padding: 12px;
            border-bottom: 1px solid #1a1a2a;
        }
        .positions-table .ticker {
            font-weight: 700;
            color: #fff;
        }
        .positions-table .long { color: #00ff88; }
        .positions-table .short { color: #ff4757; }
        .chart-container {
            height: 300px;
            position: relative;
        }
        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .agent-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .agent-btn {
            padding: 8px 16px;
            border: 1px solid #3a3a5a;
            border-radius: 20px;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .agent-btn:hover {
            border-color: #7c3aed;
            color: #fff;
        }
        .agent-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0a0a12;
            border-radius: 8px;
            margin-bottom: 16px;
            min-height: 400px;
            max-height: 500px;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
        }
        .message.user {
            background: #2a2a4a;
            margin-left: 40px;
        }
        .message.agent {
            background: #1a1a2e;
            border-left: 3px solid #7c3aed;
        }
        .message .agent-name {
            font-size: 11px;
            color: #7c3aed;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .message .content {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .chat-input-container {
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 14px;
        }
        .chat-input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.05);
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>ATLAS</h1>
            <div class="subtitle">AI Trading, Logic & Analysis System</div>
        </div>
        <div id="last-updated" style="color: #666; font-size: 12px;"></div>
    </div>

    <div class="portfolio-summary" id="portfolio-summary">
        <div class="stat-card">
            <div class="label">Portfolio Value</div>
            <div class="value" id="portfolio-value">$0</div>
        </div>
        <div class="stat-card">
            <div class="label">Day P&L</div>
            <div class="value" id="day-pnl">$0</div>
        </div>
        <div class="stat-card">
            <div class="label">Total P&L</div>
            <div class="value" id="total-pnl">$0</div>
        </div>
        <div class="stat-card">
            <div class="label">Cash</div>
            <div class="value" id="cash-value">$0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="card">
                <h2>Equity Curve</h2>
                <div class="chart-container">
                    <canvas id="equity-chart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>Positions</h2>
                <table class="positions-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Direction</th>
                            <th>Allocation</th>
                            <th>Entry</th>
                            <th>Current</th>
                            <th>P&L</th>
                        </tr>
                    </thead>
                    <tbody id="positions-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card chat-panel">
            <h2>Agent Chat</h2>
            <div class="agent-selector" id="agent-selector"></div>
            <div class="chat-messages" id="chat-messages">
                <div class="message agent">
                    <div class="agent-name">System</div>
                    <div class="content">Select an agent above and ask a question to get started.</div>
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chat-input" placeholder="Ask the agents..." />
                <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/atlas-api';
        let selectedAgent = 'cio';
        let equityChart = null;

        const agents = {
            'cio': 'CIO',
            'druckenmiller': 'Druckenmiller',
            'aschenbrenner': 'Aschenbrenner',
            'baker': 'Baker',
            'ackman': 'Ackman',
            'adversarial': 'Adversarial',
            'news': 'News',
            'flow': 'Flow'
        };

        function init() {
            renderAgentSelector();
            loadPortfolio();
            loadPnLHistory();

            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }

        function renderAgentSelector() {
            const container = document.getElementById('agent-selector');
            container.innerHTML = Object.entries(agents).map(([key, name]) =>
                `<button class="agent-btn ${key === selectedAgent ? 'active' : ''}" onclick="selectAgent('${key}')">${name}</button>`
            ).join('');
        }

        function selectAgent(agent) {
            selectedAgent = agent;
            renderAgentSelector();
        }

        async function loadPortfolio() {
            try {
                const res = await fetch(`${API_BASE}/api/atlas/portfolio`);
                const data = await res.json();

                document.getElementById('portfolio-value').textContent = `$${(data.portfolio_value || 0).toLocaleString()}`;
                document.getElementById('last-updated').textContent = `Updated: ${data.last_updated || 'N/A'}`;

                const positions = data.positions || [];
                const positionsBody = document.getElementById('positions-body');
                positionsBody.innerHTML = positions.map(pos => {
                    const pnl = ((pos.current_price - pos.entry_price) / pos.entry_price * 100).toFixed(2);
                    const pnlClass = parseFloat(pnl) >= 0 ? 'positive' : 'negative';
                    const dirClass = pos.direction === 'LONG' ? 'long' : 'short';
                    return `
                        <tr>
                            <td class="ticker">${pos.ticker}</td>
                            <td class="${dirClass}">${pos.direction}</td>
                            <td>${pos.allocation_pct}%</td>
                            <td>$${pos.entry_price.toFixed(2)}</td>
                            <td>$${pos.current_price.toFixed(2)}</td>
                            <td class="${pnlClass}">${pnl}%</td>
                        </tr>
                    `;
                }).join('');

                // Calculate totals
                let cashPos = positions.find(p => p.ticker === 'BIL');
                if (cashPos) {
                    document.getElementById('cash-value').textContent = `$${(cashPos.allocation_pct * data.portfolio_value / 100).toLocaleString()}`;
                }
            } catch (err) {
                console.error('Failed to load portfolio:', err);
            }
        }

        async function loadPnLHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/atlas/portfolio`);
                const data = await res.json();

                // Generate sample equity curve data
                const labels = [];
                const values = [];
                const baseValue = 1000000;
                const currentValue = data.portfolio_value || baseValue;

                for (let i = 30; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                    // Simulate equity curve
                    const noise = (Math.random() - 0.5) * 10000;
                    const trend = (30 - i) * ((currentValue - baseValue) / 30);
                    values.push(baseValue + trend + noise);
                }
                values[values.length - 1] = currentValue;

                if (equityChart) equityChart.destroy();

                const ctx = document.getElementById('equity-chart').getContext('2d');
                equityChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Portfolio Value',
                            data: values,
                            borderColor: '#7c3aed',
                            backgroundColor: 'rgba(124, 58, 237, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#666' }
                            },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: {
                                    color: '#666',
                                    callback: (v) => '$' + (v/1000).toFixed(0) + 'k'
                                }
                            }
                        }
                    }
                });

                // Calculate P&L
                const totalPnL = currentValue - baseValue;
                const totalPnLPct = ((currentValue / baseValue - 1) * 100).toFixed(2);
                document.getElementById('total-pnl').textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toLocaleString()}`;
                document.getElementById('total-pnl').className = `value ${totalPnL >= 0 ? 'positive' : 'negative'}`;

                document.getElementById('day-pnl').textContent = '-$180';
                document.getElementById('day-pnl').className = 'value negative';
            } catch (err) {
                console.error('Failed to load P&L history:', err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById('chat-messages');
            const sendBtn = document.getElementById('send-btn');

            // Add user message
            messagesDiv.innerHTML += `
                <div class="message user">
                    <div class="content">${escapeHtml(message)}</div>
                </div>
            `;

            input.value = '';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            // Add loading indicator
            const loadingId = 'loading-' + Date.now();
            messagesDiv.innerHTML += `
                <div class="message agent" id="${loadingId}">
                    <div class="agent-name">${agents[selectedAgent]}</div>
                    <div class="content"><span class="loading"></span> Thinking...</div>
                </div>
            `;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/api/atlas/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, agent: selectedAgent })
                });

                const data = await res.json();
                const loadingMsg = document.getElementById(loadingId);

                let responseText = '';
                if (data.response) {
                    if (typeof data.response === 'string') {
                        responseText = data.response;
                    } else if (data.response.response) {
                        responseText = data.response.response;
                    } else if (data.response.brief_for_cio) {
                        responseText = data.response.brief_for_cio;
                    } else {
                        responseText = JSON.stringify(data.response, null, 2);
                    }
                }

                loadingMsg.querySelector('.content').innerHTML = escapeHtml(responseText);
            } catch (err) {
                const loadingMsg = document.getElementById(loadingId);
                loadingMsg.querySelector('.content').textContent = 'Error: ' + err.message;
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
